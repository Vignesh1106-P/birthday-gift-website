<!DOCTYPE html>
<html>
<head>
<title>Loading Surprise</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(#ffb6d9,#ffe6f2);
    font-family:Arial;
}

.loader{
    font-size:80px;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

h2{
    color:#8b0055;
}
</style>
</head>

<body>

<div class="loader">🎁</div>

<h2>Preparing Your Surprise...</h2>

<script>
setTimeout(function(){
    window.location.href="/";
},3000);
</script>

</body>
</html>
