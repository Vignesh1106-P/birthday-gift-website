<!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<style>

body{
    margin:0;
    background:linear-gradient(#ffb6d9,#ffe6f2);
    overflow:hidden;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#8b0055;
}

.score{
    font-size:28px;
    font-weight:bold;
    color:#8b0055;
}

.timer{
    font-size:25px;
    color:red;
}

.cake{
    position:absolute;
    font-size:70px;
    cursor:pointer;
}

#result{
    display:none;
    margin-top:100px;
    font-size:35px;
    color:#8b0055;
    font-weight:bold;
}

.wish-text{
    position:fixed;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#8b0055;
}

</style>
</head>

<body>

<h1>🎂 Catch The Cake 🎂</h1>

<div class="score">
Score : <span id="score">0</span>
</div>

<div class="timer">
Time : <span id="time">30</span>
</div>

<div id="cake" class="cake">🎂</div>
<div id="wishText" class="wish-text"></div>

<div id="result">
🎉 Happy Birthday Thangachi ❤️ <br><br>
Your Score :
<span id="finalScore"></span>
</div>

<script>

let score = 0;

let wishes = [
    "Happy Birthday Thangachi ❤️",
    "Stay happy always 😊",
    "You are the best sister 💖",
    "Keep smiling forever 😄",
    "May all your dreams come true ✨",
    "Love you my dear sister 🎂",
    "Best Brother & Sister Forever 💝"
];

let time = 30;

const cake = document.getElementById("cake");

function moveCake(){

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 150);

    cake.style.left = x + "px";
    cake.style.top = y + "px";
}

cake.onclick = function(){
    score++;
    document.getElementById("score").innerHTML = score;

    let randomWish = wishes[Math.floor(Math.random() * wishes.length)];
    document.getElementById("wishText").innerHTML = randomWish;

    moveCake();
}

moveCake();

let gameTimer = setInterval(function(){

    time--;

    document.getElementById("time").innerHTML = time;

    if(time <= 0){

        clearInterval(gameTimer);

        cake.style.display = "none";

        document.getElementById("result").style.display = "block";

        document.getElementById("finalScore").innerHTML = score;
    }

},1000);

</script>

</body>
</html>
