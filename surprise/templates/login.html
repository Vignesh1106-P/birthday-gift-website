<!DOCTYPE html>
<html>
<head>
<title>Birthday Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(120deg,#ff9ad5,#ffd6ec,#ffb6d9);
    overflow:hidden;
}

.login-box{
    width:350px;
    padding:35px;
    background:white;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px hotpink;
    animation:pop 1.2s ease;
}

@keyframes pop{
    0%{transform:scale(0);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

h1{
    color:#8b0055;
}

input{
    width:90%;
    padding:15px;
    font-size:17px;
    border-radius:12px;
    border:2px solid hotpink;
    outline:none;
}

button{
    padding:13px 30px;
    font-size:18px;
    background:hotpink;
    color:white;
    border:none;
    border-radius:15px;
    cursor:pointer;
    animation:shake 1.5s infinite;
}

@keyframes shake{
    0%{transform:rotate(0);}
    25%{transform:rotate(3deg);}
    50%{transform:rotate(-3deg);}
    75%{transform:rotate(3deg);}
    100%{transform:rotate(0);}
}

.heart{
    position:absolute;
    top:-50px;
    font-size:30px;
    animation:fall 7s linear infinite;
}

.h1{left:10%;}
.h2{left:30%;animation-delay:2s;}
.h3{left:60%;animation-delay:4s;}
.h4{left:85%;animation-delay:1s;}

@keyframes fall{
    0%{transform:translateY(-50px);}
    100%{transform:translateY(110vh);}
}

.password-box{
    position:relative;
    width:100%;
}

.password-box input{
    width:85%;
    padding-right:45px;
}

.eye{
    position:absolute;
    right:25px;
    top:13px;
    cursor:pointer;
    font-size:20px;
}

.typing-heart{
    height:25px;
    color:#ff1493;
    font-weight:bold;
    margin-top:8px;
}

#emojiMask{
    margin-top:10px;
    font-size:25px;
}

#strengthText{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="heart h1">💖</div>
<div class="heart h2">🎂</div>
<div class="heart h3">🎁</div>
<div class="heart h4">💝</div>

<h2 id="countdown" style="
color:white;
font-size:28px;
margin-bottom:20px;
text-shadow:2px 2px 10px hotpink;">
</h2>

<div class="login-box">
    <h1>🔒 Birthday Surprise 🔒</h1>
    <p>Enter secret password to open your gift 🎁</p>

    <form method="POST">
        {% csrf_token %}

        <div class="password-box">
    <input id="passwordInput"
       type="password"
       name="password"
       placeholder="Secret Password"
       oninput="showEmoji()">
    <span onclick="togglePassword()" class="eye">👁️</span>
</div>

<div id="typingHeart" class="typing-heart"></div>

<div id="emojiMask"></div>
<div id="strengthText"></div>

        <br><br>

        <button type="submit">Unlock 🎁</button>
    </form>

    <h3 style="color:red;">{{ error }}</h3>
</div>

<script>

let birthdayDate = new Date("June 28, 2026 00:00:00").getTime();

setInterval(function(){

    let now = new Date().getTime();
    let distance = birthdayDate - now;
    
    if(distance <= 0){
    document.getElementById("countdown").innerHTML =
    "🎉 Happy Birthday Thangachi ❤️";
    return;
    }

    let days = Math.floor(distance / (1000 * 60 * 60 * 24));
    let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
    "🎂 Birthday Countdown: " +
    days + "d " +
    hours + "h " +
    minutes + "m " +
    seconds + "s";

},1000);

</script>

<script>
function togglePassword(){
    let input = document.getElementById("passwordInput");
    let eye = document.querySelector(".eye");

    if(input.type === "password"){
        input.type = "text";
        eye.innerHTML = "🙈";
    }else{
        input.type = "password";
        eye.innerHTML = "👁️";
    }
}

function showTypingHeart(){
    document.getElementById("typingHeart").innerHTML = "💖 Secret unlocking...";
}


function showEmoji(){

    let pass =
    document.getElementById("passwordInput").value;

    let emoji = "";

    let emojis = [
"🎂",
"🎁",
"🎈",
"🎉",
"🍫",
"🧸",
"🌹",
"👑"
];

    for(let i=0;i<pass.length;i++){

        emoji += emojis[
            Math.floor(Math.random()*emojis.length)
        ];
    }

    document.getElementById("emojiMask").innerHTML = emoji;

    let strength =
    document.getElementById("strengthText");

    if(pass.length < 4){
        strength.innerHTML = "💔 Weak";
        strength.style.color = "red";
    }
    else if(pass.length < 8){
        strength.innerHTML = "💛 Medium";
        strength.style.color = "orange";
    }
    else{
        strength.innerHTML = "💙 Strong";
        strength.style.color = "blue";
    }
}   

</script>

</body>
</html>
